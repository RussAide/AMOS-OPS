[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "https://amos-ops-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/trpc/*"
  to = "https://amos-ops-production.up.railway.app/trpc/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
