[build]
  command = "npm run build:client"
  publish = "dist/public"
  # Production publishes only through the protected matching-pair workflow.
  # This prevents the linked Git repository from racing that controlled path.
  ignore = "node ./scripts/netlify-git-build-policy.mjs"

[build.environment]
  NODE_VERSION = "24"

# Netlify serves the single browser build. VITE_AMOS_API_ORIGIN points this build
# to the existing Railway API; account profiles select Training or Operational.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
