# Netlify Configuration for AMOS-OPS Frontend
# Railway backend: amos-ops-production.up.railway.app

[build]
  publish = "dist/public"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# API proxy: all /api/* requests go to Railway backend
[[redirects]]
  from = "/api/*"
  to = "https://amos-ops-production.up.railway.app/api/:splat"
  status = 200
  force = true

# Upload proxy: file downloads from Railway
[[redirects]]
  from = "/uploads/*"
  to = "https://amos-ops-production.up.railway.app/uploads/:splat"
  status = 200
  force = true

# SPA fallback: all routes serve index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200