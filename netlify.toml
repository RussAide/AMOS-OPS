[build]
  command = "npm install && npm run build:client"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/api/*"
  to = "https://YOUR_RAILWAY_BACKEND_URL/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/trpc/*"
  to = "https://YOUR_RAILWAY_BACKEND_URL/trpc/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { NODE_ENV = "production" }