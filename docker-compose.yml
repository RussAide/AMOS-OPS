# AMOS-OPS Full-Stack Deployment
# Docker Compose configuration for production deployment

version: "3.8"

services:
  amos-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amos-ops-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Persist uploaded files
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/amos-ops.db
      - JWT_SECRET=${JWT_SECRET:-amos-ops-change-me-in-production}
      - APP_ID=${APP_ID:-amos-ops}
      - APP_SECRET=${APP_SECRET:-amos-ops-secret}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/trpc/ping').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Nginx reverse proxy for SSL termination
