name: Production End-to-End Canonical Activation

on:
  push:
    branches:
      - agent/production-end-to-end-activation-20260718

permissions:
  contents: read
  statuses: write

concurrency:
  group: amos-ops-production-end-to-end
  cancel-in-progress: false

env:
  BASELINE_SHA: 6e303ae0f8f3fafe7867d577ed43865b6ba9ccbc
  BASELINE_RELEASE_ID: AMOS-OPS-END-TO-END-20260718-6e303ae
  CANDIDATE_PARENT_SHA: 4749d3df3488e2bdb4883452d31314a3e63908d4
  CANDIDATE_SHA: 3098f467cbbf54c942355912ee6b18fb5496fbb3
  CANDIDATE_TREE: 882568e773f3c78ba7e714f7743f85a772fb13d1
  SOURCE_DIGEST: 8030ee209056008f60be84da8acaf7ac2773cffc11e477e60cdc46b26532eee2
  RELEASE_ID: AMOS-OPS-SIDEBAR-INTEGRITY-20260718-3098f46
  APPROVAL_ID: AMOS-OPS-SIDEBAR-INTEGRITY-20260718
  CHANGE_REFERENCE: USER-AUTHORIZED-COMPLETE-SIDEBAR-FIX-20260718
  PRODUCTION_ORIGIN: https://amos-ops.com
  PRODUCTION_API_ORIGIN: https://amos-ops-production.up.railway.app
  PROD_RAILWAY_PROJECT_ID: f9357da4-00c4-4f25-a52d-5c53f6ce07dc
  PROD_RAILWAY_ENVIRONMENT_ID: 7c22d214-abac-478f-983b-1418a7cbac77
  PROD_RAILWAY_SERVICE_ID: 8fdf6d7e-c7ba-412d-95f0-8b980ba612ba

jobs:
  activate-production:
    name: Verify, deploy, and prove the complete Production sidebar fix
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: amos-production

    steps:
      - name: Mark Production activation pending
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          payload="$(jq --null-input --compact-output \
            --arg state pending \
            --arg context "AMOS-OPS Sidebar Integrity Production Activation" \
            --arg description "Protected complete sidebar activation is running" \
            --arg target_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{state:$state, context:$context, description:$description, target_url:$target_url}')"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$CANDIDATE_SHA" \
            >/dev/null

      - name: Preflight protected Production credentials
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          missing=()
          test -n "$RAILWAY_TOKEN" || missing+=(RAILWAY_TOKEN)
          test -n "$NETLIFY_AUTH_TOKEN" || missing+=(NETLIFY_AUTH_TOKEN)
          if (( ${#missing[@]} )); then
            printf 'Missing amos-production GitHub environment credential: %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Check out the exact permanent-fix candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: 3098f467cbbf54c942355912ee6b18fb5496fbb3
          fetch-depth: 2

      - name: Assert immutable source identity
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
          test "$(git rev-parse HEAD^{tree})" = "$CANDIDATE_TREE"
          test "$(git rev-parse "$CANDIDATE_SHA^")" = "$CANDIDATE_PARENT_SHA"
          test "$(git archive --format=tar HEAD | sha256sum | cut -d' ' -f1)" = "$SOURCE_DIGEST"
          git diff --check "$BASELINE_SHA" "$CANDIDATE_SHA"
          test "$(cat public/_redirects)" = "/* /index.html 200"

      - name: Use Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Run complete verification
        run: npm run verify

      - name: Verify built runtime safety
        run: npm run test:dms1:built-runtime

      - name: Prove the exact Production frontend build
        shell: bash
        run: |
          VITE_AMOS_API_ORIGIN="$PRODUCTION_API_ORIGIN" npm run build:client
          test -z "$(git status --porcelain)"
          mapfile -t assets < <(find dist/public/assets -maxdepth 1 -type f -name 'index-*.js' -print)
          test "${#assets[@]}" = "1"
          local_asset="${assets[0]}"
          grep --fixed-strings "$PRODUCTION_API_ORIGIN" "$local_asset" >/dev/null
          grep --fixed-strings "/api/upload" "$local_asset" >/dev/null
          grep --fixed-strings "/admin/access-recovery" "$local_asset" >/dev/null
          printf '%s' "$local_asset" > /tmp/amos-local-asset-path
          sha256sum "$local_asset" | cut -d' ' -f1 > /tmp/amos-local-asset-sha

      - name: Install pinned Railway CLI
        run: npm install --global @railway/cli@5.27.0

      - name: Verify the current Production baseline and capture rollback points
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          runtime="$(curl --fail --silent --show-error --max-time 20 "$PRODUCTION_API_ORIGIN/api/runtime-config")"
          jq --exit-status \
            --arg build "$BASELINE_SHA" \
            --arg release "$BASELINE_RELEASE_ID" \
            '.buildId == $build
             and .productionReleaseId == $release
             and .appEnvironment == "production"
             and .deploymentPosture == "live"
             and .productionReleaseAuthorized == true
             and .reviewDeployment == false
             and .safeguards.productionDataAllowed == true' \
            <<<"$runtime" >/dev/null

          curl --fail --silent --show-error --max-time 20 "$PRODUCTION_API_ORIGIN/api/health" |
            jq --exit-status '.ready == true and .checks.database.status == "ok"' >/dev/null

          railway deployment list \
            --service "$PROD_RAILWAY_SERVICE_ID" \
            --environment "$PROD_RAILWAY_ENVIRONMENT_ID" \
            --limit 20 \
            --json > /tmp/amos-railway-baseline-deployments.json
          jq --exit-status \
            'type == "array"
             and length > 0
             and .[0].status == "SUCCESS"
             and (.[0].id | type == "string" and length > 0)' \
            /tmp/amos-railway-baseline-deployments.json >/dev/null
          jq --raw-output '.[0].id' /tmp/amos-railway-baseline-deployments.json \
            > /tmp/amos-railway-rollback-deployment-id

          site_id="${NETLIFY_SITE_ID:-}"
          if test -z "$site_id"; then
            curl --fail --silent --show-error --max-time 30 \
              --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              "https://api.netlify.com/api/v1/sites?per_page=100" \
              --output /tmp/amos-netlify-sites.json
            jq --exit-status \
              '[.[] | select(.custom_domain == "amos-ops.com")] | length == 1' \
              /tmp/amos-netlify-sites.json >/dev/null
            site_id="$(jq --raw-output \
              '.[] | select(.custom_domain == "amos-ops.com") | .id' \
              /tmp/amos-netlify-sites.json)"
          fi
          test -n "$site_id"
          printf 'NETLIFY_SITE_ID=%s\n' "$site_id" >> "$GITHUB_ENV"

          curl --fail --silent --show-error --max-time 30 \
            --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$site_id" \
            --output /tmp/amos-netlify-baseline-site.json
          jq --exit-status \
            --arg site "$site_id" \
            '.id == $site
             and (.published_deploy.id | type == "string" and length > 0)' \
            /tmp/amos-netlify-baseline-site.json >/dev/null
          jq --raw-output '.published_deploy.id' /tmp/amos-netlify-baseline-site.json \
            > /tmp/amos-netlify-rollback-deployment-id

          index_html="$(curl --fail --silent --show-error --max-time 20 \
            --header 'Cache-Control: no-cache' "$PRODUCTION_ORIGIN/")"
          asset_path="$(grep -oE 'src="/assets/index-[^"]+\.js"' <<<"$index_html" |
            head -1 | cut -d'"' -f2)"
          test -n "$asset_path"
          curl --fail --silent --show-error --max-time 30 \
            "$PRODUCTION_ORIGIN$asset_path" --output /tmp/amos-netlify-baseline-index.js
          sha256sum /tmp/amos-netlify-baseline-index.js | cut -d' ' -f1 \
            > /tmp/amos-netlify-baseline-asset-sha
          grep --fixed-strings "$PRODUCTION_API_ORIGIN" /tmp/amos-netlify-baseline-index.js >/dev/null

          curl --fail --silent --show-error --max-time 20 "$PRODUCTION_ORIGIN/login" |
            grep --ignore-case '<!doctype html>' >/dev/null

      - name: Capture the authentication state that must remain unchanged
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          variables_file="$(mktemp)"
          railway variable list \
            --project "$PROD_RAILWAY_PROJECT_ID" \
            --environment "$PROD_RAILWAY_ENVIRONMENT_ID" \
            --service "$PROD_RAILWAY_SERVICE_ID" \
            --json >"$variables_file"

          jq --exit-status \
            'all(
               .AMOS_BUILD_ID,
               .AMOS_PRODUCTION_RELEASE_ID,
               .DEPLOYMENT_APPROVAL_ID,
               .DEPLOYMENT_CHANGE_REFERENCE,
               .APP_SECRET,
               .JWT_SECRET,
               .AMOS_INITIAL_ADMIN_EMAIL,
               .AMOS_INITIAL_ADMIN_FIRST_NAME,
               .AMOS_INITIAL_ADMIN_LAST_NAME,
               .AMOS_INITIAL_ADMIN_INVITATION_TOKEN_HASH,
               .AMOS_INITIAL_ADMIN_INVITATION_EXPIRES_AT;
               type == "string" and length > 0
             )
             and .DATABASE_PATH == "/app/persistent/data/production/amos-ops.db"
             and .UPLOAD_PATH == "/app/persistent/uploads/production"
             and .CREDENTIAL_NAMESPACE == "amos-ops/production"
             and (.AMOS_ALLOWED_ORIGINS | split(",") | index("https://amos-ops.com") != null)' \
            "$variables_file" >/dev/null

          jq --exit-status \
            --arg build "$BASELINE_SHA" \
            --arg release "$BASELINE_RELEASE_ID" \
            '.AMOS_BUILD_ID == $build and .AMOS_PRODUCTION_RELEASE_ID == $release' \
            "$variables_file" >/dev/null

          jq \
            '{AMOS_BUILD_ID,
              AMOS_PRODUCTION_RELEASE_ID,
              DEPLOYMENT_APPROVAL_ID,
              DEPLOYMENT_CHANGE_REFERENCE}' \
            "$variables_file" > /tmp/amos-production-rollback-identity.json
          chmod 600 /tmp/amos-production-rollback-identity.json

          jq --compact-output --sort-keys \
            '{APP_SECRET,
              JWT_SECRET,
              AMOS_INITIAL_ADMIN_EMAIL,
              AMOS_INITIAL_ADMIN_FIRST_NAME,
              AMOS_INITIAL_ADMIN_LAST_NAME,
              AMOS_INITIAL_ADMIN_INVITATION_TOKEN_HASH,
              AMOS_INITIAL_ADMIN_INVITATION_EXPIRES_AT}' \
            "$variables_file" |
            sha256sum | cut -d' ' -f1 > /tmp/amos-authentication-baseline-sha
          chmod 600 /tmp/amos-authentication-baseline-sha
          rm -f "$variables_file"

      - name: Stage the new Production identity without deploying
        id: stage-production
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          touch /tmp/amos-railway-mutation-started
          railway variable set \
            "AMOS_BUILD_ID=$CANDIDATE_SHA" \
            "AMOS_PRODUCTION_RELEASE_ID=$RELEASE_ID" \
            "DEPLOYMENT_APPROVAL_ID=$APPROVAL_ID" \
            "DEPLOYMENT_CHANGE_REFERENCE=$CHANGE_REFERENCE" \
            --project "$PROD_RAILWAY_PROJECT_ID" \
            --environment "$PROD_RAILWAY_ENVIRONMENT_ID" \
            --service "$PROD_RAILWAY_SERVICE_ID" \
            --skip-deploys \
            --json >/dev/null

      - name: Deploy the exact candidate to Production Railway
        id: backend-deploy
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --project "$PROD_RAILWAY_PROJECT_ID" \
            --environment "$PROD_RAILWAY_ENVIRONMENT_ID" \
            --service "$PROD_RAILWAY_SERVICE_ID" \
            --detach \
            --json \
            --message "AMOS-OPS complete sidebar integrity fix $CANDIDATE_SHA"

      - name: Wait for the Production Railway candidate
        id: backend-verified
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          for attempt in $(seq 1 120); do
            runtime="$(curl --fail --silent --show-error --max-time 20 \
              "$PRODUCTION_API_ORIGIN/api/runtime-config" || true)"
            if jq --exit-status \
              --arg build "$CANDIDATE_SHA" \
              --arg release "$RELEASE_ID" \
              '.buildId == $build
               and .productionReleaseId == $release
               and .appEnvironment == "production"
               and .deploymentPosture == "live"
               and .productionReleaseAuthorized == true
               and .reviewDeployment == false
               and .safeguards.productionDataAllowed == true' \
              <<<"$runtime" >/dev/null 2>&1; then
              curl --fail --silent --show-error --max-time 20 \
                "$PRODUCTION_API_ORIGIN/api/health" |
                jq --exit-status \
                  '.ready == true and .checks.database.status == "ok"' >/dev/null

              variables_file="$(mktemp)"
              railway variable list \
                --project "$PROD_RAILWAY_PROJECT_ID" \
                --environment "$PROD_RAILWAY_ENVIRONMENT_ID" \
                --service "$PROD_RAILWAY_SERVICE_ID" \
                --json >"$variables_file"
              jq --compact-output --sort-keys \
                '{APP_SECRET,
                  JWT_SECRET,
                  AMOS_INITIAL_ADMIN_EMAIL,
                  AMOS_INITIAL_ADMIN_FIRST_NAME,
                  AMOS_INITIAL_ADMIN_LAST_NAME,
                  AMOS_INITIAL_ADMIN_INVITATION_TOKEN_HASH,
                  AMOS_INITIAL_ADMIN_INVITATION_EXPIRES_AT}' \
                "$variables_file" |
                sha256sum | cut -d' ' -f1 > /tmp/amos-authentication-candidate-sha
              cmp --silent \
                /tmp/amos-authentication-baseline-sha \
                /tmp/amos-authentication-candidate-sha
              rm -f "$variables_file"
              break
            fi
            if test "$attempt" = "120"; then
              echo "The permanent Railway candidate did not become ready in time." >&2
              exit 1
            fi
            sleep 10
          done

          old_deployment="$(cat /tmp/amos-railway-rollback-deployment-id)"
          for attempt in $(seq 1 30); do
            railway deployment list \
              --service "$PROD_RAILWAY_SERVICE_ID" \
              --environment "$PROD_RAILWAY_ENVIRONMENT_ID" \
              --limit 20 \
              --json > /tmp/amos-railway-candidate-deployments.json
            if jq --exit-status \
              --arg old "$old_deployment" \
              '.[0].status == "SUCCESS" and .[0].id != $old' \
              /tmp/amos-railway-candidate-deployments.json >/dev/null 2>&1; then
              jq --raw-output '.[0].id' /tmp/amos-railway-candidate-deployments.json \
                > /tmp/amos-railway-candidate-deployment-id
              exit 0
            fi
            sleep 5
          done
          echo "The new Railway deployment ID could not be confirmed." >&2
          exit 1

      - name: Begin the atomic Netlify Production update
        shell: bash
        run: touch /tmp/amos-netlify-mutation-started

      - name: Deploy the exact frontend build to Production Netlify
        id: netlify-deploy
        uses: nwtgck/actions-netlify@4cbaf4c08f1a7bfa537d6113472ef4424e4eb654
        with:
          publish-dir: "./dist/public"
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "AMOS-OPS complete sidebar integrity fix 3098f46"
          enable-pull-request-comment: false
          enable-commit-comment: false
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Verify Production frontend, backend, CORS, and every sidebar route
        id: production-verified
        shell: bash
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          local_sha="$(cat /tmp/amos-local-asset-sha)"
          for attempt in $(seq 1 60); do
            index_html="$(curl --fail --silent --show-error --max-time 20 \
              --header 'Cache-Control: no-cache' \
              "$PRODUCTION_ORIGIN/?activation=$CANDIDATE_SHA" || true)"
            asset_path="$(grep -oE 'src="/assets/index-[^"]+\.js"' <<<"$index_html" |
              head -1 | cut -d'"' -f2)"
            if test -n "$asset_path"; then
              curl --fail --silent --show-error --max-time 30 \
                "$PRODUCTION_ORIGIN$asset_path" --output /tmp/amos-live-index.js
              if test "$(sha256sum /tmp/amos-live-index.js | cut -d' ' -f1)" = "$local_sha"; then
                printf '%s' "$asset_path" > /tmp/amos-live-asset-path
                break
              fi
            fi
            if test "$attempt" = "60"; then
              echo "The exact Netlify frontend build did not become live in time." >&2
              exit 1
            fi
            sleep 5
          done

          grep --fixed-strings "$PRODUCTION_API_ORIGIN" /tmp/amos-live-index.js >/dev/null
          grep --fixed-strings "/api/upload" /tmp/amos-live-index.js >/dev/null
          grep --fixed-strings "/admin/access-recovery" /tmp/amos-live-index.js >/dev/null

          curl --fail --silent --show-error --max-time 20 "$PRODUCTION_ORIGIN/login" |
            grep --ignore-case '<!doctype html>' >/dev/null
          curl --fail --silent --show-error --max-time 20 \
            "$PRODUCTION_ORIGIN/admin/access-recovery" |
            grep --ignore-case '<!doctype html>' >/dev/null

          mapfile -t sidebar_routes < <(
            node --import tsx --input-type=module --eval \
              'import { flattenSidebarLinks, getSidebarNavigation } from "./src/data/sidebar-navigation.ts"; for (const link of flattenSidebarLinks(getSidebarNavigation("super-admin", "production"))) console.log(link.href);'
          )
          test "${#sidebar_routes[@]}" = "67"
          for route in "${sidebar_routes[@]}"; do
            route_html="$(curl --fail --silent --show-error --max-time 20 \
              "$PRODUCTION_ORIGIN$route")"
            grep --fixed-strings '<div id="root"></div>' \
              <<<"$route_html" >/dev/null

            route_headers="$(mktemp)"
            route_status="$(curl --silent --show-error --output /dev/null \
              --dump-header "$route_headers" --write-out '%{http_code}' \
              --max-redirs 0 --max-time 20 "$PRODUCTION_API_ORIGIN$route")"
            test "$route_status" = "308"
            tr -d '\r' <"$route_headers" |
              grep --fixed-strings --ignore-case \
                "location: $PRODUCTION_ORIGIN$route" >/dev/null
            rm -f "$route_headers"
          done
          printf '%s' "${#sidebar_routes[@]}" > /tmp/amos-live-sidebar-route-count

          curl --fail --silent --show-error --max-time 30 \
            --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID" \
            --output /tmp/amos-netlify-candidate-site.json
          jq --exit-status \
            --arg old "$(cat /tmp/amos-netlify-rollback-deployment-id)" \
            '.published_deploy.id != $old
             and (.published_deploy.id | type == "string" and length > 0)' \
            /tmp/amos-netlify-candidate-site.json >/dev/null
          jq --raw-output '.published_deploy.id' /tmp/amos-netlify-candidate-site.json \
            > /tmp/amos-netlify-candidate-deployment-id

          root_headers="$(mktemp)"
          root_status="$(curl --silent --show-error --output /dev/null \
            --dump-header "$root_headers" --write-out '%{http_code}' \
            --max-redirs 0 "$PRODUCTION_API_ORIGIN/")"
          test "$root_status" = "308"
          tr -d '\r' <"$root_headers" |
            grep --fixed-strings --ignore-case \
              "location: $PRODUCTION_ORIGIN/" >/dev/null

          deep_headers="$(mktemp)"
          deep_status="$(curl --silent --show-error --output /dev/null \
            --dump-header "$deep_headers" --write-out '%{http_code}' \
            --max-redirs 0 "$PRODUCTION_API_ORIGIN/operations?tab=links")"
          test "$deep_status" = "308"
          tr -d '\r' <"$deep_headers" |
            grep --fixed-strings --ignore-case \
              "location: $PRODUCTION_ORIGIN/operations?tab=links" >/dev/null

          runtime="$(curl --fail --silent --show-error --max-time 20 \
            "$PRODUCTION_API_ORIGIN/api/runtime-config")"
          jq --exit-status \
            --arg build "$CANDIDATE_SHA" \
            --arg release "$RELEASE_ID" \
            '.buildId == $build
             and .productionReleaseId == $release
             and .deploymentPosture == "live"
             and .productionReleaseAuthorized == true
             and .reviewDeployment == false' \
            <<<"$runtime" >/dev/null

          curl --fail --silent --show-error --max-time 20 \
            "$PRODUCTION_API_ORIGIN/api/health" |
            jq --exit-status \
              '.ready == true and .checks.database.status == "ok"' >/dev/null

          api_404_status="$(curl --silent --show-error --output /tmp/amos-api-404.json \
            --write-out '%{http_code}' "$PRODUCTION_API_ORIGIN/api/not-a-route")"
          test "$api_404_status" = "404"
          jq --exit-status '.error == "Not Found"' /tmp/amos-api-404.json >/dev/null

          me_response="$(curl --fail --silent --show-error --max-time 20 \
            "$PRODUCTION_API_ORIGIN/api/trpc/auth.me")"
          jq --exit-status \
            'has("result")
             and (.result.data | has("json"))
             and .result.data.json == null' \
            <<<"$me_response" >/dev/null

          cors_headers="$(mktemp)"
          cors_status="$(curl --silent --show-error --output /dev/null \
            --dump-header "$cors_headers" --write-out '%{http_code}' \
            --request OPTIONS "$PRODUCTION_API_ORIGIN/api/runtime-config" \
            --header "Origin: $PRODUCTION_ORIGIN" \
            --header "Access-Control-Request-Method: GET")"
          test "$cors_status" = "204"
          tr -d '\r' <"$cors_headers" |
            grep --fixed-strings --ignore-case \
              "access-control-allow-origin: $PRODUCTION_ORIGIN" >/dev/null

          upload_headers="$(mktemp)"
          upload_status="$(curl --silent --show-error --output /dev/null \
            --dump-header "$upload_headers" --write-out '%{http_code}' \
            --request OPTIONS "$PRODUCTION_API_ORIGIN/api/upload" \
            --header "Origin: $PRODUCTION_ORIGIN" \
            --header "Access-Control-Request-Method: POST" \
            --header "Access-Control-Request-Headers: authorization,content-type,x-amos-workspace")"
          test "$upload_status" = "204"
          normalized_upload_headers="$(tr '[:upper:]' '[:lower:]' <"$upload_headers" | tr -d '\r')"
          grep --fixed-strings \
            "access-control-allow-origin: $PRODUCTION_ORIGIN" \
            <<<"$normalized_upload_headers" >/dev/null
          allow_headers="$(grep '^access-control-allow-headers:' \
            <<<"$normalized_upload_headers")"
          grep --fixed-strings "authorization" <<<"$allow_headers" >/dev/null
          grep --fixed-strings "content-type" <<<"$allow_headers" >/dev/null
          grep --fixed-strings "x-amos-workspace" <<<"$allow_headers" >/dev/null

      - name: Roll back both Production surfaces while preserving authentication
        if: ${{ failure() }}
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          if test -f /tmp/amos-railway-mutation-started; then
            old_build="$(jq --exit-status --raw-output \
              '.AMOS_BUILD_ID' /tmp/amos-production-rollback-identity.json)"
            old_release="$(jq --exit-status --raw-output \
              '.AMOS_PRODUCTION_RELEASE_ID' /tmp/amos-production-rollback-identity.json)"
            old_approval="$(jq --exit-status --raw-output \
              '.DEPLOYMENT_APPROVAL_ID' /tmp/amos-production-rollback-identity.json)"
            old_change="$(jq --exit-status --raw-output \
              '.DEPLOYMENT_CHANGE_REFERENCE' /tmp/amos-production-rollback-identity.json)"
            railway variable set \
              "AMOS_BUILD_ID=$old_build" \
              "AMOS_PRODUCTION_RELEASE_ID=$old_release" \
              "DEPLOYMENT_APPROVAL_ID=$old_approval" \
              "DEPLOYMENT_CHANGE_REFERENCE=$old_change" \
              --project "$PROD_RAILWAY_PROJECT_ID" \
              --environment "$PROD_RAILWAY_ENVIRONMENT_ID" \
              --service "$PROD_RAILWAY_SERVICE_ID" \
              --skip-deploys \
              --json >/dev/null

            rollback_id="$(cat /tmp/amos-railway-rollback-deployment-id)"
            payload="$(jq --null-input --compact-output \
              --arg id "$rollback_id" \
              '{query:"mutation DeploymentRedeploy($id: String!) { deploymentRedeploy(id: $id) { id } }", variables:{id:$id}}')"
            response="$(curl --fail --silent --show-error \
              --header "Content-Type: application/json" \
              --header "Project-Access-Token: $RAILWAY_TOKEN" \
              --data "$payload" \
              https://backboard.railway.com/graphql/v2)"
            jq --exit-status \
              '.data.deploymentRedeploy.id and ((.errors // []) | length == 0)' \
              <<<"$response" >/dev/null
          fi

          if test -f /tmp/amos-netlify-mutation-started; then
            rollback_id="$(cat /tmp/amos-netlify-rollback-deployment-id)"
            curl --fail --silent --show-error \
              --request POST \
              --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys/$rollback_id/restore" \
              >/dev/null
          fi

          if test -f /tmp/amos-railway-mutation-started; then
            for attempt in $(seq 1 120); do
              runtime="$(curl --fail --silent --show-error --max-time 20 \
                "$PRODUCTION_API_ORIGIN/api/runtime-config" || true)"
              if jq --exit-status \
                --arg build "$BASELINE_SHA" \
                --arg release "$BASELINE_RELEASE_ID" \
                '.buildId == $build
                 and .productionReleaseId == $release
                 and .deploymentPosture == "live"' \
                <<<"$runtime" >/dev/null 2>&1; then
                curl --fail --silent --show-error --max-time 20 \
                  "$PRODUCTION_API_ORIGIN/api/health" |
                  jq --exit-status \
                    '.ready == true and .checks.database.status == "ok"' >/dev/null
                break
              fi
              if test "$attempt" = "120"; then
                echo "Railway rollback did not become ready in time." >&2
                exit 1
              fi
              sleep 10
            done
          fi

          if test -f /tmp/amos-netlify-mutation-started; then
            rollback_sha="$(cat /tmp/amos-netlify-baseline-asset-sha)"
            for attempt in $(seq 1 60); do
              index_html="$(curl --fail --silent --show-error --max-time 20 \
                --header 'Cache-Control: no-cache' \
                "$PRODUCTION_ORIGIN/?rollback=$BASELINE_SHA" || true)"
              asset_path="$(grep -oE 'src="/assets/index-[^"]+\.js"' <<<"$index_html" |
                head -1 | cut -d'"' -f2)"
              if test -n "$asset_path"; then
                curl --fail --silent --show-error --max-time 30 \
                  "$PRODUCTION_ORIGIN$asset_path" --output /tmp/amos-rollback-index.js
                if test "$(sha256sum /tmp/amos-rollback-index.js | cut -d' ' -f1)" = "$rollback_sha"; then
                  exit 0
                fi
              fi
              sleep 5
            done
            echo "Netlify rollback did not become ready in time." >&2
            exit 1
          fi

      - name: Record the Production activation summary
        if: ${{ success() }}
        shell: bash
        run: |
          {
            echo "### AMOS-OPS complete sidebar integrity fix activated"
            echo "- Candidate: $CANDIDATE_SHA"
            echo "- Tree: $CANDIDATE_TREE"
            echo "- Release: $RELEASE_ID"
            echo "- Railway deployment: $(cat /tmp/amos-railway-candidate-deployment-id)"
            echo "- Netlify deploy: $(cat /tmp/amos-netlify-candidate-deployment-id)"
            echo "- Frontend asset: $(cat /tmp/amos-live-asset-path)"
            echo "- Frontend SHA-256: $(cat /tmp/amos-local-asset-sha)"
            echo "- Live sidebar destinations verified: $(cat /tmp/amos-live-sidebar-route-count)"
            echo "- Authentication and recovery variables: unchanged"
            echo "- RM.2/TA.1: paused"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record the final Production activation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          state=success
          description="Complete sidebar integrity fix is active in Production"
          if test "${{ job.status }}" != "success"; then
            state=failure
            description="Production activation failed; rollback was attempted"
          fi
          payload="$(jq --null-input --compact-output \
            --arg state "$state" \
            --arg context "AMOS-OPS Sidebar Integrity Production Activation" \
            --arg description "$description" \
            --arg target_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{state:$state, context:$context, description:$description, target_url:$target_url}')"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$CANDIDATE_SHA" \
            >/dev/null
