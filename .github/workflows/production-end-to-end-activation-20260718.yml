name: Production Release (Identity-Decoupled)

on:
  push:
    branches:
      - agent/auth-stab-1-rebuild-20260719
      - agent/production-sidebar-integrity-20260718
  workflow_dispatch:
    inputs:
      release_sha:
        description: Verified commit to deploy
        required: true

permissions:
  contents: read

concurrency:
  group: amos-ops-production-release
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    environment: amos-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with: { ref: "${{ inputs.release_sha || github.sha }}" }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with: { node-version: "24", cache: npm }
      - run: npm ci
      - run: npm run verify
      - run: npm run test:dms1:built-runtime
      - run: npm run verify:release-identity-boundary
      - name: Deploy backend artifact without identity mutation
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install --global @railway/cli@5.27.0
          railway up --service 8fdf6d7e-c7ba-412d-95f0-8b980ba612ba --environment 7c22d214-abac-478f-983b-1418a7cbac77 --ci
      - name: Deploy frontend artifact
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          VITE_AMOS_API_ORIGIN: https://amos-ops-production.up.railway.app
        run: |
          npm run build:client
          npx --yes netlify-cli@23.11.1 deploy --prod --dir dist/public --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
