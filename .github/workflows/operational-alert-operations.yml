name: Protected Operational Alert Operations

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Explicit alert operation to execute
        type: choice
        options: [diagnose, reconcile]
        required: true
      cutoff:
        description: Reconcile only; ISO-8601 cutoff with timezone
        required: false
        type: string
      diagnosis_fingerprint:
        description: Reconcile only; exact fingerprint from a fresh diagnosis
        required: false
        type: string

permissions: { contents: read }
concurrency: { group: amos-ops-production-alerts, cancel-in-progress: false }

jobs:
  diagnose:
    if: ${{ inputs.operation == 'diagnose' }}
    environment: amos-production
    runs-on: ubuntu-latest
    steps:
      - name: Execute signed, privacy-safe read-only alert diagnosis
        shell: bash
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          set -euo pipefail
          test -n "$APP_SECRET"
          operation_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-alert-diagnose"
          timestamp="$(date -u +%FT%TZ)"
          path=/api/operator/operational-alerts/diagnosis
          body=''
          digest="$(printf %s "$body" | sha256sum | awk '{print $1}')"
          canonical="$(printf 'v1\n%s\n%s\nGET\n%s\n%s' "$timestamp" "$operation_id" "$path" "$digest")"
          signature="$(printf %s "$canonical" | openssl dgst -sha256 -hmac "$APP_SECRET" -hex | awk '{print $2}')"
          curl --fail-with-body --silent --show-error -X GET "https://amos-ops-production.up.railway.app$path" \
            -H "x-amos-operator-timestamp: $timestamp" \
            -H "x-amos-operator-operation-id: $operation_id" \
            -H "x-amos-operator-signature: $signature" | jq .

  reconcile:
    if: ${{ inputs.operation == 'reconcile' }}
    environment: amos-production
    runs-on: ubuntu-latest
    steps:
      - name: Execute fingerprint-gated bounded reconciliation
        shell: bash
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
          CUTOFF: ${{ inputs.cutoff }}
          DIAGNOSIS_FINGERPRINT: ${{ inputs.diagnosis_fingerprint }}
        run: |
          set -euo pipefail
          test -n "$APP_SECRET"
          if ! [[ "$CUTOFF" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T.*(Z|[+-][0-9]{2}:[0-9]{2})$ ]]; then
            echo "cutoff must be an ISO-8601 timestamp with a timezone" >&2
            exit 2
          fi
          if ! [[ "$DIAGNOSIS_FINGERPRINT" =~ ^[a-f0-9]{64}$ ]]; then
            echo "diagnosis_fingerprint must be the exact lowercase SHA-256 from a fresh diagnosis" >&2
            exit 2
          fi
          operation_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-alert-reconcile"
          timestamp="$(date -u +%FT%TZ)"
          path=/api/operator/operational-alerts/reconciliation
          body="$(jq -nc --arg operationId "$operation_id" --arg cutoff "$CUTOFF" --arg diagnosisFingerprint "$DIAGNOSIS_FINGERPRINT" '{operationId:$operationId,cutoff:$cutoff,diagnosisFingerprint:$diagnosisFingerprint}')"
          digest="$(printf %s "$body" | sha256sum | awk '{print $1}')"
          canonical="$(printf 'v1\n%s\n%s\nPOST\n%s\n%s' "$timestamp" "$operation_id" "$path" "$digest")"
          signature="$(printf %s "$canonical" | openssl dgst -sha256 -hmac "$APP_SECRET" -hex | awk '{print $2}')"
          curl --fail-with-body --silent --show-error -X POST "https://amos-ops-production.up.railway.app$path" \
            -H "content-type: application/json" \
            -H "x-amos-operator-timestamp: $timestamp" \
            -H "x-amos-operator-operation-id: $operation_id" \
            -H "x-amos-operator-signature: $signature" \
            --data "$body" | jq .
