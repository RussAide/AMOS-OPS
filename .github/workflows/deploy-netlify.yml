name: Deploy Frontend to Netlify

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Controlled environment
        required: true
        type: choice
        options: [staging, production]
      approval_id:
        description: Approved release identifier
        required: true
        type: string
      change_reference:
        description: Change-control reference
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: amos-${{ inputs.target_environment }}
    concurrency: amos-ops-web-${{ inputs.target_environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run env:validate
        env:
          APP_ENV: ${{ inputs.target_environment }}
          AMOS_ENVIRONMENT_ID: amos-ops-${{ inputs.target_environment }}
          CREDENTIAL_NAMESPACE: amos-ops/${{ inputs.target_environment }}
          NODE_ENV: production
          DATABASE_PATH: /app/data/${{ inputs.target_environment }}/amos-ops.db
          TRAINING_DATABASE_PATH: /app/data/${{ inputs.target_environment }}/training/amos-ops-training.db
          UPLOAD_PATH: /app/uploads/${{ inputs.target_environment }}
          TRAINING_UPLOAD_PATH: /app/uploads/${{ inputs.target_environment }}/training
          APP_SECRET: ${{ secrets.APP_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEPLOYMENT_APPROVAL_ID: ${{ inputs.approval_id }}
          DEPLOYMENT_CHANGE_REFERENCE: ${{ inputs.change_reference }}
          AMOS_ALLOWED_ORIGINS: ${{ vars.AMOS_ALLOWED_ORIGINS }}
      - run: npm run verify
        env:
          APP_ENV: ${{ inputs.target_environment }}
          AMOS_ENVIRONMENT_ID: amos-ops-${{ inputs.target_environment }}
          CREDENTIAL_NAMESPACE: amos-ops/${{ inputs.target_environment }}
          NODE_ENV: production
          DATABASE_PATH: ./data/${{ inputs.target_environment }}/amos-ops-ci.db
          TRAINING_DATABASE_PATH: ./data/${{ inputs.target_environment }}/training/amos-ops-training-ci.db
          UPLOAD_PATH: ./uploads/${{ inputs.target_environment }}
          TRAINING_UPLOAD_PATH: ./uploads/${{ inputs.target_environment }}/training
          APP_SECRET: ${{ secrets.APP_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEPLOYMENT_APPROVAL_ID: ${{ inputs.approval_id }}
          DEPLOYMENT_CHANGE_REFERENCE: ${{ inputs.change_reference }}
          AMOS_ALLOWED_ORIGINS: ${{ vars.AMOS_ALLOWED_ORIGINS }}
          VITE_AMOS_API_ORIGIN: ${{ vars.AMOS_API_ORIGIN }}
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./dist/public"
          production-branch: main
          production-deploy: ${{ inputs.target_environment == 'production' }}
          alias: ${{ inputs.target_environment == 'staging' && 'staging' || '' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          VITE_AMOS_API_ORIGIN: ${{ vars.AMOS_API_ORIGIN }}
