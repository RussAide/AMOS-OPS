name: Deploy Frontend to Netlify (Staging only)

on:
  workflow_dispatch:
    inputs:
      approval_id:
        description: Approved staging release identifier
        required: true
        type: string
      change_reference:
        description: Change-control reference
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: amos-staging
    concurrency: amos-ops-web-staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run env:validate
        env:
          APP_ENV: staging
          AMOS_RUNTIME_MODE: production
          AMOS_ENVIRONMENT_ID: amos-ops-staging
          CREDENTIAL_NAMESPACE: amos-ops/staging
          NODE_ENV: production
          PERSISTENT_ROOT: /app/data/staging
          DATABASE_PATH: /app/data/staging/amos-ops.db
          TRAINING_DATABASE_PATH: /app/data/staging/training/amos-ops-training.db
          UPLOAD_PATH: /app/uploads/staging
          TRAINING_UPLOAD_PATH: /app/uploads/staging/training
          BACKUP_PATH: /app/data/staging/backups
          APP_SECRET: ${{ secrets.APP_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEPLOYMENT_APPROVAL_ID: ${{ inputs.approval_id }}
          DEPLOYMENT_CHANGE_REFERENCE: ${{ inputs.change_reference }}
          AMOS_ALLOWED_ORIGINS: ${{ vars.AMOS_ALLOWED_ORIGINS }}
          ALLOW_SELF_REGISTRATION: "false"
          MFA_POLICY: required-all
          AMOS_PRODUCTION_RELEASE_AUTHORIZED: "false"
          AMOS_PRODUCTION_RELEASE_ID: ""
      - run: npm run verify
        env:
          VITE_AMOS_API_ORIGIN: ${{ vars.AMOS_API_ORIGIN }}
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./dist/public"
          production-branch: main
          production-deploy: false
          alias: staging
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          VITE_AMOS_API_ORIGIN: ${{ vars.AMOS_API_ORIGIN }}
