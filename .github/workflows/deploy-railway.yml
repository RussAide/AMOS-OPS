name: Deploy Backend to Railway

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Controlled environment
        required: true
        type: choice
        options: [staging, production]
      approval_id:
        description: Approved release identifier
        required: true
        type: string
      change_reference:
        description: Change-control reference
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: amos-${{ inputs.target_environment }}
    concurrency: amos-ops-${{ inputs.target_environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run env:validate
        env:
          APP_ENV: ${{ inputs.target_environment }}
          AMOS_RUNTIME_MODE: production
          AMOS_ENVIRONMENT_ID: amos-ops-${{ inputs.target_environment }}
          CREDENTIAL_NAMESPACE: amos-ops/${{ inputs.target_environment }}
          NODE_ENV: production
          PERSISTENT_ROOT: ${{ inputs.target_environment == 'production' && '/app/persistent' || '/app/data/staging' }}
          DATABASE_PATH: ${{ inputs.target_environment == 'production' && '/app/persistent/data/production/amos-ops.db' || '/app/data/staging/amos-ops.db' }}
          TRAINING_DATABASE_PATH: ${{ inputs.target_environment == 'production' && '/app/persistent/data/production/training/amos-ops-training.db' || '/app/data/staging/training/amos-ops-training.db' }}
          UPLOAD_PATH: ${{ inputs.target_environment == 'production' && '/app/persistent/uploads/production' || '/app/uploads/staging' }}
          TRAINING_UPLOAD_PATH: ${{ inputs.target_environment == 'production' && '/app/persistent/uploads/production/training' || '/app/uploads/staging/training' }}
          BACKUP_PATH: ${{ inputs.target_environment == 'production' && '/app/persistent/backups/production' || '/app/data/staging/backups' }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEPLOYMENT_APPROVAL_ID: ${{ inputs.approval_id }}
          DEPLOYMENT_CHANGE_REFERENCE: ${{ inputs.change_reference }}
          AMOS_ALLOWED_ORIGINS: ${{ vars.AMOS_ALLOWED_ORIGINS }}
          ALLOW_SELF_REGISTRATION: "false"
          MFA_POLICY: required-all
          AMOS_PRODUCTION_RELEASE_AUTHORIZED: ${{ inputs.target_environment == 'production' && 'true' || 'false' }}
          AMOS_PRODUCTION_RELEASE_ID: ${{ inputs.target_environment == 'production' && inputs.approval_id || '' }}
      - run: npm run verify
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --service "${{ vars.RAILWAY_SERVICE }}" --environment "${{ inputs.target_environment }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
