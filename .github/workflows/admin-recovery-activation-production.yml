name: Production Administrator Recovery Activation

on:
  push:
    branches:
      - agent/production-admin-recovery-activation-20260718

permissions:
  contents: read
  statuses: write

concurrency:
  group: amos-ops-auth-permanent-production
  cancel-in-progress: false

env:
  BASELINE_SHA: 2b2139cebb11df5245737213ab9919f5425f36ee
  CANDIDATE_SHA: 5e846e25f72ed008e86f3b8211e0d79e88aa88db
  CANDIDATE_TREE: 1de54d1b6b758b7ba9e9736f9ba30760e0264d82
  SOURCE_DIGEST: ba16caf789c425850f67c5379ed09b1c0809e5438e21807a6af7efe038757da0
  RELEASE_ID: AMOS-OPS-ADMIN-RECOVERY-20260718-5e846e2
  APPROVAL_ID: AMOS-OPS-ADMIN-RECOVERY-20260718
  CHANGE_REFERENCE: USER-AUTHORIZED-ADMIN-RECOVERY-ROTATION-20260718
  PRODUCTION_ORIGIN: https://amos-ops.com
  PRODUCTION_API_ORIGIN: https://amos-ops-production.up.railway.app
  PROD_RAILWAY_PROJECT_ID: f9357da4-00c4-4f25-a52d-5c53f6ce07dc
  PROD_RAILWAY_ENVIRONMENT_ID: 7c22d214-abac-478f-983b-1418a7cbac77
  PROD_RAILWAY_SERVICE_ID: 8fdf6d7e-c7ba-412d-95f0-8b980ba612ba
  ROLLBACK_RAILWAY_DEPLOYMENT_ID: 97e58394-72ac-48c4-a37b-1bd944b22e0d
  ROLLBACK_RAILWAY_BUILD_ID: 2b2139cebb11df5245737213ab9919f5425f36ee
  ROLLBACK_RELEASE_ID: AMOS-OPS-AUTH-PERMANENT-20260718-2b2139c
  CURRENT_NETLIFY_DEPLOY_ID: 6a5b7936acf3401348649f46
  RECOVERY_WINDOW_HOURS: "4"
  VITE_AMOS_API_ORIGIN: https://amos-ops-production.up.railway.app

jobs:
  activate-production-administrator-recovery:
    name: Verify, deploy, and activate administrator recovery
    runs-on: ubuntu-latest
    timeout-minutes: 50
    environment: amos-production
    steps:
      - name: Mark recovery activation pending
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          payload="$(jq --null-input --compact-output \
            --arg state pending \
            --arg context "AMOS-OPS Admin Recovery Activation" \
            --arg description "Protected administrator recovery activation is running" \
            --arg target_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{state:$state, context:$context, description:$description, target_url:$target_url}')"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$CANDIDATE_SHA" \
            >/dev/null

      - name: Preflight protected credentials
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          AMOS_ADMIN_RECOVERY_TOKEN: ${{ secrets.AMOS_ADMIN_RECOVERY_TOKEN }}
        run: |
          missing=()
          test -n "$RAILWAY_TOKEN" || missing+=(RAILWAY_TOKEN)
          test -n "$AMOS_ADMIN_RECOVERY_TOKEN" || missing+=(AMOS_ADMIN_RECOVERY_TOKEN)
          if (( ${#missing[@]} )); then
            printf 'Missing amos-production GitHub environment credential: %s\n' "${missing[@]}" >&2
            exit 1
          fi
          if [[ ! "$AMOS_ADMIN_RECOVERY_TOKEN" =~ ^[A-Za-z0-9_-]{48,}$ ]]; then
            echo "AMOS_ADMIN_RECOVERY_TOKEN must be at least 48 URL-safe characters." >&2
            exit 1
          fi

      - name: Check out the exact recovery candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: 5e846e25f72ed008e86f3b8211e0d79e88aa88db
          fetch-depth: 2

      - name: Assert immutable source identity
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
          test "$(git rev-parse HEAD^{tree})" = "$CANDIDATE_TREE"
          test "$(git rev-parse "$CANDIDATE_SHA^")" = "$BASELINE_SHA"
          test "$(git archive --format=tar HEAD | sha256sum | cut -d' ' -f1)" = "$SOURCE_DIGEST"
          git diff --check "$BASELINE_SHA" "$CANDIDATE_SHA"
          test "$(cat public/_redirects)" = "/* /index.html 200"

      - name: Use Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Run complete verification
        run: npm run verify

      - name: Verify built runtime safety
        run: npm run test:dms1:built-runtime

      - name: Install pinned Railway CLI
        run: npm install --global @railway/cli@5.27.0

      - name: Verify current Production baseline and unchanged frontend
        shell: bash
        run: |
          runtime="$(curl --fail --silent --show-error --max-time 20 "$PRODUCTION_API_ORIGIN/api/runtime-config")"
          jq --exit-status \
            --arg build "$ROLLBACK_RAILWAY_BUILD_ID" \
            --arg release "$ROLLBACK_RELEASE_ID" \
            '.buildId == $build
             and .productionReleaseId == $release
             and .appEnvironment == "production"
             and .deploymentPosture == "live"
             and .productionReleaseAuthorized == true
             and .reviewDeployment == false' \
            <<<"$runtime" >/dev/null

          curl --fail --silent --show-error --max-time 20 "$PRODUCTION_API_ORIGIN/api/health" |
            jq --exit-status '.ready == true and .checks.database.status == "ok"' >/dev/null

          local_asset="$(find dist/public/assets -maxdepth 1 -type f -name 'index-*.js' -print -quit)"
          test -n "$local_asset"
          local_sha="$(sha256sum "$local_asset" | cut -d' ' -f1)"
          index_html="$(curl --fail --silent --show-error --max-time 20 "$PRODUCTION_ORIGIN/")"
          asset_path="$(grep -oE 'src="/assets/index-[^"]+\.js"' <<<"$index_html" | head -1 | cut -d'"' -f2)"
          test -n "$asset_path"
          curl --fail --silent --show-error --max-time 30 \
            "$PRODUCTION_ORIGIN$asset_path" --output /tmp/amos-current-index.js
          test "$(sha256sum /tmp/amos-current-index.js | cut -d' ' -f1)" = "$local_sha"
          grep --fixed-strings "$PRODUCTION_API_ORIGIN" /tmp/amos-current-index.js >/dev/null

      - name: Derive protected recovery hash and capture rollback metadata
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          AMOS_ADMIN_RECOVERY_TOKEN: ${{ secrets.AMOS_ADMIN_RECOVERY_TOKEN }}
        run: |
          variables_file="$(mktemp)"
          railway variable list \
            --project "$PROD_RAILWAY_PROJECT_ID" \
            --environment "$PROD_RAILWAY_ENVIRONMENT_ID" \
            --service "$PROD_RAILWAY_SERVICE_ID" \
            --json >"$variables_file"

          jq --exit-status \
            'all(
               .AMOS_BUILD_ID,
               .AMOS_PRODUCTION_RELEASE_ID,
               .DEPLOYMENT_APPROVAL_ID,
               .DEPLOYMENT_CHANGE_REFERENCE,
               .APP_SECRET,
               .JWT_SECRET,
               .AMOS_INITIAL_ADMIN_EMAIL,
               .AMOS_INITIAL_ADMIN_FIRST_NAME,
               .AMOS_INITIAL_ADMIN_LAST_NAME,
               .AMOS_INITIAL_ADMIN_INVITATION_TOKEN_HASH,
               .AMOS_INITIAL_ADMIN_INVITATION_EXPIRES_AT;
               type == "string" and length > 0
             )
             and .DATABASE_PATH == "/app/persistent/data/production/amos-ops.db"
             and .UPLOAD_PATH == "/app/persistent/uploads/production"
             and .CREDENTIAL_NAMESPACE == "amos-ops/production"' \
            "$variables_file" >/dev/null

          APP_SECRET="$(jq --exit-status --raw-output '.APP_SECRET' "$variables_file")"
          export APP_SECRET AMOS_ADMIN_RECOVERY_TOKEN
          python3 - <<'PY'
          import hashlib
          import hmac
          import os
          from pathlib import Path

          digest = hmac.new(
              os.environ["APP_SECRET"].strip().encode("utf-8"),
              os.environ["AMOS_ADMIN_RECOVERY_TOKEN"].encode("utf-8"),
              hashlib.sha256,
          ).hexdigest()
          Path("/tmp/amos-admin-recovery-hash").write_text(digest, encoding="utf-8")
          PY
          unset APP_SECRET AMOS_ADMIN_RECOVERY_TOKEN
          chmod 600 /tmp/amos-admin-recovery-hash

          new_hash="$(cat /tmp/amos-admin-recovery-hash)"
          old_hash="$(jq --exit-status --raw-output '.AMOS_INITIAL_ADMIN_INVITATION_TOKEN_HASH' "$variables_file")"
          test -n "$new_hash"
          if test "$new_hash" = "$old_hash"; then
            echo "The new recovery token must differ from the consumed token." >&2
            exit 1
          fi

          date --utc --date "+$RECOVERY_WINDOW_HOURS hours" +'%Y-%m-%dT%H:%M:%S.000Z' \
            > /tmp/amos-admin-recovery-expiry
          chmod 600 /tmp/amos-admin-recovery-expiry

          jq \
            '{AMOS_BUILD_ID,
              AMOS_PRODUCTION_RELEASE_ID,
              DEPLOYMENT_APPROVAL_ID,
              DEPLOYMENT_CHANGE_REFERENCE,
              AMOS_INITIAL_ADMIN_INVITATION_TOKEN_HASH,
              AMOS_INITIAL_ADMIN_INVITATION_EXPIRES_AT}' \
            "$variables_file" > /tmp/amos-production-recovery-rollback.json
          chmod 600 /tmp/amos-production-recovery-rollback.json
          rm -f "$variables_file"

      - name: Stage recovery identity without deploying
        id: stage-recovery
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          recovery_hash="$(cat /tmp/amos-admin-recovery-hash)"
          recovery_expiry="$(cat /tmp/amos-admin-recovery-expiry)"
          printf '::add-mask::%s\n' "$recovery_hash"
          railway variable set \
            "AMOS_BUILD_ID=$CANDIDATE_SHA" \
            "AMOS_PRODUCTION_RELEASE_ID=$RELEASE_ID" \
            "DEPLOYMENT_APPROVAL_ID=$APPROVAL_ID" \
            "DEPLOYMENT_CHANGE_REFERENCE=$CHANGE_REFERENCE" \
            "AMOS_INITIAL_ADMIN_INVITATION_TOKEN_HASH=$recovery_hash" \
            "AMOS_INITIAL_ADMIN_INVITATION_EXPIRES_AT=$recovery_expiry" \
            --project "$PROD_RAILWAY_PROJECT_ID" \
            --environment "$PROD_RAILWAY_ENVIRONMENT_ID" \
            --service "$PROD_RAILWAY_SERVICE_ID" \
            --skip-deploys \
            --json >/dev/null

      - name: Deploy exact recovery candidate to Production Railway
        id: backend-deploy
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --project "$PROD_RAILWAY_PROJECT_ID" \
            --environment "$PROD_RAILWAY_ENVIRONMENT_ID" \
            --service "$PROD_RAILWAY_SERVICE_ID" \
            --detach \
            --json \
            --message "AMOS-OPS protected administrator recovery $CANDIDATE_SHA"

      - name: Wait for recovery activation and live safety posture
        id: recovery-verified
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          for attempt in $(seq 1 120); do
            runtime="$(curl --fail --silent --show-error --max-time 20 "$PRODUCTION_API_ORIGIN/api/runtime-config" || true)"
            if jq --exit-status \
              --arg build "$CANDIDATE_SHA" \
              --arg release "$RELEASE_ID" \
              '.buildId == $build
               and .productionReleaseId == $release
               and .appEnvironment == "production"
               and .deploymentPosture == "live"
               and .productionReleaseAuthorized == true
               and .reviewDeployment == false
               and .safeguards.productionDataAllowed == true' \
              <<<"$runtime" >/dev/null 2>&1; then
              curl --fail --silent --show-error --max-time 20 "$PRODUCTION_API_ORIGIN/api/health" |
                jq --exit-status '.ready == true and .checks.database.status == "ok"' >/dev/null

              variables_file="$(mktemp)"
              railway variable list \
                --project "$PROD_RAILWAY_PROJECT_ID" \
                --environment "$PROD_RAILWAY_ENVIRONMENT_ID" \
                --service "$PROD_RAILWAY_SERVICE_ID" \
                --json >"$variables_file"
              jq --exit-status \
                --arg recovery_hash "$(cat /tmp/amos-admin-recovery-hash)" \
                --arg recovery_expiry "$(cat /tmp/amos-admin-recovery-expiry)" \
                '.AMOS_INITIAL_ADMIN_INVITATION_TOKEN_HASH == $recovery_hash
                 and .AMOS_INITIAL_ADMIN_INVITATION_EXPIRES_AT == $recovery_expiry' \
                "$variables_file" >/dev/null
              rm -f "$variables_file"
              exit 0
            fi
            sleep 10
          done
          echo "Protected administrator recovery did not become ready in time." >&2
          exit 1

      - name: Verify unchanged Production frontend, backend, CORS, and routes
        id: production-verified
        shell: bash
        run: |
          index_html="$(curl --fail --silent --show-error --max-time 20 "$PRODUCTION_ORIGIN/")"
          asset_path="$(grep -oE 'src="/assets/index-[^"]+\.js"' <<<"$index_html" | head -1 | cut -d'"' -f2)"
          test -n "$asset_path"
          curl --fail --silent --show-error --max-time 30 \
            "$PRODUCTION_ORIGIN$asset_path" --output /tmp/amos-live-index.js
          test "$(sha256sum /tmp/amos-live-index.js | cut -d' ' -f1)" = \
            "$(sha256sum /tmp/amos-current-index.js | cut -d' ' -f1)"
          grep --fixed-strings "$PRODUCTION_API_ORIGIN" /tmp/amos-live-index.js >/dev/null
          grep --fixed-strings "Account Recovery" /tmp/amos-live-index.js >/dev/null

          curl --fail --silent --show-error --max-time 20 "$PRODUCTION_ORIGIN/login" |
            grep --ignore-case '<!doctype html>' >/dev/null
          curl --fail --silent --show-error --max-time 20 "$PRODUCTION_ORIGIN/admin/access-recovery" |
            grep --ignore-case '<!doctype html>' >/dev/null

          headers="$(mktemp)"
          status="$(curl --silent --show-error --output /dev/null --dump-header "$headers" \
            --write-out '%{http_code}' \
            --request OPTIONS "$PRODUCTION_API_ORIGIN/api/runtime-config" \
            --header "Origin: $PRODUCTION_ORIGIN" \
            --header "Access-Control-Request-Method: GET")"
          test "$status" = "204"
          tr -d '\r' <"$headers" |
            grep --fixed-strings --ignore-case "access-control-allow-origin: $PRODUCTION_ORIGIN" >/dev/null

      - name: Invalidate recovery token and restore Production on failure
        if: ${{ failure() && steps.stage-recovery.outcome == 'success' }}
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          invalidation_hash="$(openssl rand -hex 32)"
          invalidation_expiry="$(date --utc --date '+3650 days' +'%Y-%m-%dT%H:%M:%S.000Z')"
          printf '::add-mask::%s\n' "$invalidation_hash"

          old_build="$(jq --exit-status --raw-output '.AMOS_BUILD_ID' /tmp/amos-production-recovery-rollback.json)"
          old_release="$(jq --exit-status --raw-output '.AMOS_PRODUCTION_RELEASE_ID' /tmp/amos-production-recovery-rollback.json)"
          old_approval="$(jq --exit-status --raw-output '.DEPLOYMENT_APPROVAL_ID' /tmp/amos-production-recovery-rollback.json)"
          old_change="$(jq --exit-status --raw-output '.DEPLOYMENT_CHANGE_REFERENCE' /tmp/amos-production-recovery-rollback.json)"
          railway variable set \
            "AMOS_BUILD_ID=$old_build" \
            "AMOS_PRODUCTION_RELEASE_ID=$old_release" \
            "DEPLOYMENT_APPROVAL_ID=$old_approval" \
            "DEPLOYMENT_CHANGE_REFERENCE=$old_change" \
            "AMOS_INITIAL_ADMIN_INVITATION_TOKEN_HASH=$invalidation_hash" \
            "AMOS_INITIAL_ADMIN_INVITATION_EXPIRES_AT=$invalidation_expiry" \
            --project "$PROD_RAILWAY_PROJECT_ID" \
            --environment "$PROD_RAILWAY_ENVIRONMENT_ID" \
            --service "$PROD_RAILWAY_SERVICE_ID" \
            --skip-deploys \
            --json >/dev/null

          payload="$(jq --null-input --compact-output \
            --arg id "$ROLLBACK_RAILWAY_DEPLOYMENT_ID" \
            '{query:"mutation DeploymentRedeploy($id: String!) { deploymentRedeploy(id: $id) { id } }", variables:{id:$id}}')"
          response="$(curl --fail --silent --show-error \
            --header "Content-Type: application/json" \
            --header "Project-Access-Token: $RAILWAY_TOKEN" \
            --data "$payload" \
            https://backboard.railway.com/graphql/v2)"
          jq --exit-status '.data.deploymentRedeploy.id and ((.errors // []) | length == 0)' \
            <<<"$response" >/dev/null

          for attempt in $(seq 1 120); do
            runtime="$(curl --fail --silent --show-error --max-time 20 "$PRODUCTION_API_ORIGIN/api/runtime-config" || true)"
            if jq --exit-status \
              --arg build "$old_build" \
              --arg release "$old_release" \
              '.buildId == $build and .productionReleaseId == $release and .deploymentPosture == "live"' \
              <<<"$runtime" >/dev/null 2>&1; then
              curl --fail --silent --show-error --max-time 20 "$PRODUCTION_API_ORIGIN/api/health" |
                jq --exit-status '.ready == true and .checks.database.status == "ok"' >/dev/null
              exit 0
            fi
            sleep 10
          done
          echo "Production recovery rollback did not become ready in time." >&2
          exit 1

      - name: Record recovery activation summary
        if: ${{ success() }}
        shell: bash
        run: |
          {
            echo "### AMOS-OPS administrator recovery activated"
            echo "- Candidate: \`$CANDIDATE_SHA\`"
            echo "- Tree: \`$CANDIDATE_TREE\`"
            echo "- Release: \`$RELEASE_ID\`"
            echo "- Railway: \`$PRODUCTION_API_ORIGIN\`"
            echo "- Netlify deploy preserved: \`$CURRENT_NETLIFY_DEPLOY_ID\`"
            echo "- Recovery expires: \`$(cat /tmp/amos-admin-recovery-expiry)\`"
            echo "- Plaintext token: never logged or persisted by this workflow"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record recovery activation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          state=success
          description="Protected administrator recovery is active"
          if test "${{ job.status }}" != "success"; then
            state=failure
            description="Administrator recovery activation failed and was invalidated"
          fi
          payload="$(jq --null-input --compact-output \
            --arg state "$state" \
            --arg context "AMOS-OPS Admin Recovery Activation" \
            --arg description "$description" \
            --arg target_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{state:$state, context:$context, description:$description, target_url:$target_url}')"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$CANDIDATE_SHA" \
            >/dev/null
