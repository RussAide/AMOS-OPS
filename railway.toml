[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# Production storage contract: attach exactly one persistent Railway volume at
# /app/persistent. Production data, Training data, uploads, and application
# backups must all use strict descendants of that mount. See
# docs/RM1-PERSISTENCE.md for the exact paths and migration/rollback gates.
[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
numReplicas = 1
