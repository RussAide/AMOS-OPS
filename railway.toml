[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# Production storage contract: attach exactly one persistent Railway volume at
# /app/persistent. Production data, Training data, uploads, and application
# backups must all use strict descendants of that mount. See
# docs/RM1-PERSISTENCE.md for the exact paths and docs/RM2-ENCRYPTION.md for
# the sealed-key, SQLCipher, envelope-encryption, migration, and rotation gates.
[deploy]
healthcheckPath = "/api/health"
# RM.2 performs a gated, verified in-place encryption pass before the HTTP
# listener starts. Allow the singleton volume migration to finish without
# Railway replacing the process during the one-time transition.
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
numReplicas = 1
